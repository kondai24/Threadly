# Air configuration for this API service.
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"
env_files = [".env"]

[build]
  cmd = "go build -o ./tmp/main ./cmd/api"
  bin = "./tmp/main"
  args_bin = []
  include_dir = ["cmd", "internal", "docs"]
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  include_file = [".env"]
  exclude_dir = ["tmp", "vendor", "testdata", "bin", ".git"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = "500ms"
  log = "tmp/build-errors.log"
  poll = false
  poll_interval = 0
  pre_cmd = []
  post_cmd = []
  rerun = false
  rerun_delay = 500
  full_bin = ""
  ignore_dangerous_root_dir = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  enabled = false
  app_port = 0
  proxy_port = 0
  app_start_timeout = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
