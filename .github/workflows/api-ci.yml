name: api-ci

on: [push, pull_request]

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: setup
        uses: actions/setup-go@v4
        with:
          go-version: 1.25.7
        id: go
  build:
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: build
        run: |
          cd api
          go build ./...

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: test
        run: |
          cd api
          go test -v ./...

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.3
          workindir: api
